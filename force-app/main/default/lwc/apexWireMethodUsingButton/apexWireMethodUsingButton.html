<template>
    <lightning-card title="Apex Wire Method Using a Button">
        <div class="slds-m-around_medium">
            <lightning-input type='text' lable='Employee Name' placeholder='Enter StageName' onchange={changeHandler}></lightning-input>
        </div>
        <div class="slds-m-around_medium">
            <lightning-button variant="brand" label="Show Data" title="Primary action" onclick={handleClick} class="slds-m-left_x-small"></lightning-button>
        </div>
        <div class="slds-m-around_medium">
            <template if:true={oppties}>
                <b>Fetched The Below Opportunities</b>
                <br>
                <div class="slds-m-around_medium">
                    <template for:each={oppties} for:item="eachOppty">
                        <li key={eachOppty.Id}> {eachOppty.Id}, {eachOppty.Name}, {eachOppty.StageName}</li>
                    </template>
                </div>
            </template>
            <template if:true={error}>
                <p>There was some error in fetching the data error</p>
            </template>
        </div>
    </lightning-card>
</template>
