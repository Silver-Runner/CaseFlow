<template>
    <lightning-card title="Conditional Rendering Component">
        <div class="slds-m-around_medium">
            <div class="slds-form-element">
                <label class="slds-checkbox_toggle slds-grid">
                <span class="slds-form-element__label slds-m-bottom_none">Rendering Toggle</span>
                <input type="checkbox" name="checkbox-toggle-3" value="checkbox-toggle-3" role="switch" aria-describedby="checkbox-toggle-3" onchange={handleChange}/>
                <span id="checkbox-toggle-3" class="slds-checkbox_faux_container">
                <span class="slds-checkbox_faux"></span>
                <span class="slds-checkbox_on">Enabled</span>
                <span class="slds-checkbox_off">Disabled</span>
                </span>
                </label>
            </div>
            <div if:true={isChecked}>
                <b> Hey, I am The Fist Lwc</b>
                <lightning-input type='text' lable='Employee Name' placeholder='Enter name here' onchange={changeHandler}></lightning-input>
                <b>The Employee Name is :- {empName}</b>
            </div>
            <div if:false={isChecked}>
                <p>To See The Form First Please Enable The Toggle</p>
            </div>
        </div>
    </lightning-card>    
</template>
